<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SPY 0DTE • Elite Trading Platform</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0B0E11;
            --bg-elevated: #141619;
            --bg-surface: #1A1D21;
            --accent-primary: #3B82F6;
            --accent-success: #10B981;
            --accent-danger: #EF4444;
            --accent-warning: #F59E0B;
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --border: #1F2937;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 0;
        }
        
        /* Header */
        .header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .logo-spy {
            color: var(--accent-primary);
        }
        
        .logo-0dte {
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent-success);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-success);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
            padding: 1.5rem 2rem;
            min-height: calc(100vh - 73px);
        }
        
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        /* Cards */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        /* Price Display */
        .price-card {
            background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-elevated) 100%);
        }
        
        .price-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }
        
        .price-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .price-value {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--text-primary);
        }
        
        .price-change {
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
        }
        
        .price-change.positive {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }
        
        .price-change.negative {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-danger);
        }
        
        .price-meta {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .metric {
            padding: 1.25rem;
            background: var(--bg-elevated);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .metric-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .metric-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .metric-subtext {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        /* Chart */
        .chart-container {
            height: 500px;
            position: relative;
        }
        
        .chart-wrapper {
            width: 100%;
            height: 100%;
        }
        
        /* Signals */
        .signals-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .signals-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .signals-list::-webkit-scrollbar-track {
            background: var(--bg-elevated);
        }
        
        .signals-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .signal-item {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        
        .signal-item:hover {
            background: var(--bg-elevated);
        }
        
        .signal-item:last-child {
            border-bottom: none;
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .signal-type {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .signal-type.call {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }
        
        .signal-type.put {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-danger);
        }
        
        .signal-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .signal-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            font-size: 0.8125rem;
        }
        
        .signal-detail {
            display: flex;
            flex-direction: column;
        }
        
        .signal-detail-label {
            color: var(--text-muted);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .signal-detail-value {
            color: var(--text-primary);
            font-weight: 600;
            margin-top: 0.125rem;
        }
        
        .signal-reason {
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-elevated);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .empty-state {
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        /* Trades */
        .trade-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .trade-item:last-child {
            border-bottom: none;
        }
        
        .trade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .trade-type {
            font-weight: 700;
            font-size: 0.875rem;
        }
        
        .trade-type.call { color: var(--accent-success); }
        .trade-type.put { color: var(--accent-danger); }
        
        .trade-status {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .trade-status.open {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-primary);
        }
        
        .trade-status.closed {
            background: rgba(107, 114, 128, 0.15);
            color: var(--text-muted);
        }
        
        .trade-details {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .trade-pnl {
            font-weight: 700;
            margin-left: auto;
        }
        
        .trade-pnl.positive { color: var(--accent-success); }
        .trade-pnl.negative { color: var(--accent-danger); }
        
        /* Responsive */
        @media (max-width: 1280px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .right-column {
                grid-row: 1;
            }
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }
            
            .main-grid {
                padding: 1rem;
                gap: 1rem;
            }
            
            .price-value {
                font-size: 2.5rem;
            }
            
            .chart-container {
                height: 350px;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="logo-spy">SPY</span>
                <span class="logo-0dte">0DTE</span>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>BOT ACTIVE</span>
                </div>
            </div>
        </div>
        
        <div class="main-grid">
            <!-- Left Column: Charts -->
            <div class="left-column">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Live Chart • 5-Minute</div>
                    </div>
                    <div class="chart-container">
                        <div class="chart-wrapper" id="chartWrapper"></div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Bot Trades</div>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div id="tradesList">
                            <div class="empty-state">
                                <div class="empty-state-icon">📊</div>
                                <div>No trades yet. Bot is scanning for signals...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Column: Price + Metrics + Signals -->
            <div class="right-column">
                <div class="card price-card">
                    <div class="price-display">
                        <div class="price-label">SPY PRICE</div>
                        <div class="price-value" id="spyPrice">---</div>
                        <div class="price-change" id="priceChange">
                            <span id="changeValue">---</span>
                        </div>
                        <div class="price-meta" id="priceMeta">Updated: ---</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Technical Indicators</div>
                    </div>
                    <div class="card-body">
                        <div class="metrics-grid">
                            <div class="metric">
                                <div class="metric-label">RSI (14)</div>
                                <div class="metric-value" id="rsiValue">--</div>
                                <div class="metric-subtext" id="rsiSignal">Calculating...</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">MACD</div>
                                <div class="metric-value" id="macdValue">--</div>
                                <div class="metric-subtext" id="macdSignal">Calculating...</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Live Signals</div>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="signals-list" id="signalsList">
                            <div class="empty-state">
                                <div class="empty-state-icon">🎯</div>
                                <div>Scanning market for entry signals...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let chart, candleSeries, satyUpperBand, satyLowerBand;
        let priceHistory = [];
        let signals = [];
        let trades = [];
        
        // Initialize chart
        function initChart() {
            const container = document.getElementById('chartWrapper');
            
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 500,
                layout: {
                    background: { color: '#1A1D21' },
                    textColor: '#9CA3AF'
                },
                grid: {
                    vertLines: { color: '#1F2937', style: 1 },
                    horzLines: { color: '#1F2937', style: 1 }
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: {
                        color: '#6B7280',
                        width: 1,
                        style: 3,
                        labelBackgroundColor: '#3B82F6'
                    },
                    horzLine: {
                        color: '#6B7280',
                        width: 1,
                        style: 3,
                        labelBackgroundColor: '#3B82F6'
                    }
                },
                timeScale: {
                    borderColor: '#1F2937',
                    timeVisible: true,
                    secondsVisible: false
                },
                rightPriceScale: {
                    borderColor: '#1F2937'
                }
            });
            
            // Candlestick series
            candleSeries = chart.addCandlestickSeries({
                upColor: '#10B981',
                downColor: '#EF4444',
                borderVisible: false,
                wickUpColor: '#10B981',
                wickDownColor: '#EF4444'
            });
            
            // SATY Cloud - Upper Band (resistance)
            satyUpperBand = chart.addLineSeries({
                color: 'rgba(239, 68, 68, 0.6)',
                lineWidth: 2,
                title: 'SATY Upper'
            });
            
            // SATY Cloud - Lower Band (support)
            satyLowerBand = chart.addLineSeries({
                color: 'rgba(16, 185, 129, 0.6)',
                lineWidth: 2,
                title: 'SATY Lower'
            });
            
            fetchAndUpdateChart();
            
            window.addEventListener('resize', () => {
                if (chart) {
                    chart.resize(container.clientWidth, 500);
                }
            });
        }
        
        // Fetch real SPY data
        async function fetchAndUpdateChart() {
            try {
                const response = await fetch(
                    `https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=SPY&interval=5min&apikey=A3KDNVYB73BVU2PI&outputsize=compact`
                );
                const data = await response.json();
                
                if (data['Time Series (5min)']) {
                    const timeSeries = data['Time Series (5min)'];
                    const candles = [];
                    const satyUpper = [];
                    const satyLower = [];
                    
                    Object.entries(timeSeries).reverse().forEach(([timestamp, values]) => {
                        const time = new Date(timestamp).getTime() / 1000;
                        const open = parseFloat(values['1. open']);
                        const high = parseFloat(values['2. high']);
                        const low = parseFloat(values['3. low']);
                        const close = parseFloat(values['4. close']);
                        
                        candles.push({ time, open, high, low, close });
                        
                        // SATY Cloud calculation (simplified ATR-based bands)
                        const atr = (high - low) * 1.5;
                        satyUpper.push({ time, value: close + atr });
                        satyLower.push({ time, value: close - atr });
                        
                        priceHistory.push(close);
                    });
                    
                    if (candles.length > 0) {
                        candleSeries.setData(candles);
                        satyUpperBand.setData(satyUpper);
                        satyLowerBand.setData(satyLower);
                        
                        // Update current price
                        const latest = candles[candles.length - 1];
                        updatePrice(latest.close);
                        
                        // Calculate indicators
                        calculateIndicators();
                        
                        // Generate signals
                        checkForSignals(latest.close);
                    }
                }
            } catch (error) {
                console.error('Error fetching chart data:', error);
            }
        }
        
        // Update price display
        function updatePrice(price) {
            document.getElementById('spyPrice').textContent = `$${price.toFixed(2)}`;
            
            if (priceHistory.length > 1) {
                const prevPrice = priceHistory[priceHistory.length - 2];
                const change = price - prevPrice;
                const changePercent = (change / prevPrice) * 100;
                
                const changeEl = document.getElementById('priceChange');
                const changeValueEl = document.getElementById('changeValue');
                
                changeValueEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${changePercent.toFixed(2)}%)`;
                changeEl.className = change >= 0 ? 'price-change positive' : 'price-change negative';
            }
            
            const now = new Date();
            document.getElementById('priceMeta').textContent = `Updated: ${now.toLocaleTimeString()}`;
        }
        
        // Calculate RSI
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            
            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                const change = prices[i] - prices[i - 1];
                if (change > 0) gains += change;
                else losses -= change;
            }
            
            const avgGain = gains / period;
            const avgLoss = losses / period;
            
            if (avgLoss === 0) return 100;
            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }
        
        // Calculate MACD
        function calculateMACD(prices) {
            if (prices.length < 26) return 0;
            
            const ema12 = prices.slice(-12).reduce((a, b) => a + b) / 12;
            const ema26 = prices.slice(-26).reduce((a, b) => a + b) / 26;
            
            return ema12 - ema26;
        }
        
        // Update indicators
        function calculateIndicators() {
            if (priceHistory.length < 15) return;
            
            const rsi = calculateRSI(priceHistory);
            const macd = calculateMACD(priceHistory);
            
            document.getElementById('rsiValue').textContent = rsi.toFixed(1);
            document.getElementById('macdValue').textContent = macd > 0 ? `+${macd.toFixed(2)}` : macd.toFixed(2);
            
            // RSI signal
            if (rsi < 30) {
                document.getElementById('rsiSignal').textContent = 'Oversold';
                document.getElementById('rsiSignal').style.color = '#10B981';
            } else if (rsi > 70) {
                document.getElementById('rsiSignal').textContent = 'Overbought';
                document.getElementById('rsiSignal').style.color = '#EF4444';
            } else {
                document.getElementById('rsiSignal').textContent = 'Neutral';
                document.getElementById('rsiSignal').style.color = '#6B7280';
            }
            
            // MACD signal
            if (macd > 0.5) {
                document.getElementById('macdSignal').textContent = 'Bullish';
                document.getElementById('macdSignal').style.color = '#10B981';
            } else if (macd < -0.5) {
                document.getElementById('macdSignal').textContent = 'Bearish';
                document.getElementById('macdSignal').style.color = '#EF4444';
            } else {
                document.getElementById('macdSignal').textContent = 'Neutral';
                document.getElementById('macdSignal').style.color = '#6B7280';
            }
        }
        
        // Check for trading signals
        function checkForSignals(currentPrice) {
            if (priceHistory.length < 15) return;
            
            const rsi = calculateRSI(priceHistory);
            const macd = calculateMACD(priceHistory);
            
            let signal = null;
            
            // CALL Signal: RSI oversold + MACD positive momentum
            if (rsi < 35 && macd > 0) {
                signal = {
                    type: 'CALL',
                    price: currentPrice,
                    rsi: rsi,
                    macd: macd,
                    reason: `Oversold condition with bullish momentum. RSI at ${rsi.toFixed(1)}, MACD positive.`,
                    timestamp: Date.now()
                };
            }
            // PUT Signal: RSI overbought + MACD negative momentum
            else if (rsi > 65 && macd < 0) {
                signal = {
                    type: 'PUT',
                    price: currentPrice,
                    rsi: rsi,
                    macd: macd,
                    reason: `Overbought condition with bearish momentum. RSI at ${rsi.toFixed(1)}, MACD negative.`,
                    timestamp: Date.now()
                };
            }
            
            if (signal) {
                addSignal(signal);
            }
        }
        
        // Add signal to list
        function addSignal(signal) {
            signals.unshift(signal);
            if (signals.length > 10) signals.pop();
            
            renderSignals();
        }
        
        // Render signals
        function renderSignals() {
            const container = document.getElementById('signalsList');
            
            if (signals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <div>Scanning market for entry signals...</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = signals.map(signal => `
                <div class="signal-item">
                    <div class="signal-header">
                        <span class="signal-type ${signal.type.toLowerCase()}">${signal.type}</span>
                        <span class="signal-time">${new Date(signal.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="signal-details">
                        <div class="signal-detail">
                            <span class="signal-detail-label">Entry Price</span>
                            <span class="signal-detail-value">$${signal.price.toFixed(2)}</span>
                        </div>
                        <div class="signal-detail">
                            <span class="signal-detail-label">RSI</span>
                            <span class="signal-detail-value">${signal.rsi.toFixed(1)}</span>
                        </div>
                        <div class="signal-detail">
                            <span class="signal-detail-label">MACD</span>
                            <span class="signal-detail-value">${signal.macd > 0 ? '+' : ''}${signal.macd.toFixed(2)}</span>
                        </div>
                        <div class="signal-detail">
                            <span class="signal-detail-label">Confidence</span>
                            <span class="signal-detail-value">High</span>
                        </div>
                    </div>
                    <div class="signal-reason">${signal.reason}</div>
                </div>
            `).join('');
        }
        
        // Initialize
        initChart();
        
        // Refresh data every 60 seconds
        setInterval(() => {
            fetchAndUpdateChart();
        }, 60000);
    </script>
</body>
</html>
